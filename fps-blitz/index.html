<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPS Blitz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>FPS Blitz</h1>
      <p>Fast browser FPS prototype with waves and raycast 3D.</p>
    </header>

    <section class="hud">
      <div class="pill"><span>HP</span><b id="hp">100</b></div>
      <div class="pill"><span>Ammo</span><b id="ammo">12</b></div>
      <div class="pill"><span>Wave</span><b id="wave">1</b></div>
      <div class="pill"><span>Kills</span><b id="kills">0</b></div>
      <div class="pill"><span>Best</span><b id="best">0</b></div>
    </section>

    <main class="stage-wrap">
      <canvas id="game" width="1000" height="560"></canvas>
      <div id="overlay" class="overlay">
        <div class="panel">
          <h2 id="ovTitle">FPS Blitz</h2>
          <p id="ovText">WASD move • Arrow keys turn • Click/Space shoot • R reload</p>
          <button id="startBtn">Start Mission</button>
        </div>
      </div>
    </main>

    <footer>
      <a href="../index.html">← Back to Space Shooter</a>
      <a href="../shape-shifter/index.html">Play Shape Shifter</a>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
